version: "3.3"

services:
  web-nginx:
    image: nginx
    volumes:
      - ./nginx/templates:/etc/nginx/templates
    ports:
      - 8080:80
    environment:
      NGINX_PORT: 80
      NGINX_SERVER_API_HOST: api.localhost
      NGINX_SERVER_API_PROXY: 172.17.0.1:3000
      NGINX_SWAGGER_SERVER_API_HOST: swagger.localhost
      NGINX_SWAGGER_SERVER_API_PROXY: 172.17.0.1:8089

  server-api-swagger:
    image: swaggerapi/swagger-ui
    expose:
      - 8089
    ports:
      - 8089:8080
    volumes:
      - ./swagger:/app
    environment:
      SWAGGER_JSON: /app/swagger.yml
