sonar.scm.provider=git

sonar.projectKey=stevethedev_std-website
sonar.organization=stevethedev

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=std-website
#sonar.projectVersion=1.0

# Testing Information
sonar.test.inclusions=**/*.spec.ts,**/*_test.go
sonar.coverage.exclusions=**/*.spec.ts,**/*_test.go
sonar.coverage.inclusions=**/*.ts,server-api/cmd/**/*.go,server-api/internal/**/*.go

sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
sonar.typescript.lcov.reportPaths=**/coverage/lcov.info
sonar.go.coverage.reportPaths=**/coverage/coverage.out
